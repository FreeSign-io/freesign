name: Playwright Tests
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e_tests:
    name: 'E2E Tests'
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Copy env
        run: cp .env.example .env

      - uses: ./.github/actions/node-install

      - name: Start Services
        run: npm run dx:up

      - uses: ./.github/actions/playwright-install

      - name: Create the database
        run: npm run prisma:migrate-dev

      - name: Seed the database
        run: npm run prisma:seed

      - name: Install playwright system deps
        # Browsers are restored from cache by the composite action above;
        # `install-deps` only installs the apt packages those browsers need
        # to actually launch (libnss3, libatk1.0, etc). Faster than
        # `install --with-deps` which would re-download the browsers too.
        run: npx playwright install-deps

      - name: Run Playwright tests
        run: npm run ci
        env:
          NEXT_PRIVATE_SIGNING_LOCAL_FILE_PATH: './example/cert.p12'
          DANGEROUS_BYPASS_RATE_LIMITS: 'true'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: 'packages/app-tests/**/test-results/*'
          retention-days: 7
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
