name: 'Continuous Integration'

on:
  workflow_call:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_app:
    name: Build App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: ./.github/actions/node-install

      - name: Cache TS build info
        uses: actions/cache@v4
        with:
          path: |
            apps/*/.tsbuildinfo
            packages/*/.tsbuildinfo
          key: ${{ runner.os }}-tsbuildinfo-${{ hashFiles('package-lock.json', '**/tsconfig.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-tsbuildinfo-${{ hashFiles('package-lock.json', '**/tsconfig.json') }}-
            ${{ runner.os }}-tsbuildinfo-

      - name: Copy env
        run: cp .env.example .env

      - name: Build app
        run: npm run build
