name: Publish Docker

on:
  push:
    branches: ['release']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and publish (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build_and_publish_platform_containers:
    name: Build and publish platform containers
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - warp-ubuntu-latest-x64-4x
          - warp-ubuntu-latest-arm64-4x

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-tags: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build the docker image
        env:
          BUILD_PLATFORM: ${{ matrix.os == 'warp-ubuntu-latest-arm64-4x' && 'arm64' || 'amd64' }}
          NEXT_PRIVATE_TELEMETRY_KEY: ${{ secrets.NEXT_PRIVATE_TELEMETRY_KEY }}
          NEXT_PRIVATE_TELEMETRY_HOST: ${{ secrets.NEXT_PRIVATE_TELEMETRY_HOST }}
          APP_VERSION: ${{ inputs.tag || '' }}
        run: |
          if [ -z "$APP_VERSION" ]; then
            APP_VERSION="$(git name-rev --tags --name-only $(git rev-parse HEAD) | head -n 1 | sed 's/\^0//')"
          fi
          GIT_SHA="$(git rev-parse HEAD)"

          docker build \
            -f ./docker/Dockerfile \
            --progress=plain \
            --build-arg NEXT_PRIVATE_TELEMETRY_KEY="${NEXT_PRIVATE_TELEMETRY_KEY:-}" \
            --build-arg NEXT_PRIVATE_TELEMETRY_HOST="${NEXT_PRIVATE_TELEMETRY_HOST:-}" \
            -t "ghcr.io/freesign-io/freesign-$BUILD_PLATFORM:latest" \
            -t "ghcr.io/freesign-io/freesign-$BUILD_PLATFORM:$GIT_SHA" \
            -t "ghcr.io/freesign-io/freesign-$BUILD_PLATFORM:$APP_VERSION" \
            .

      - name: Push the docker image to GitHub Container Registry
        run: docker push --all-tags "ghcr.io/freesign-io/freesign-$BUILD_PLATFORM"
        env:
          BUILD_PLATFORM: ${{ matrix.os == 'warp-ubuntu-latest-arm64-4x' && 'arm64' || 'amd64' }}

  create_and_publish_manifest:
    name: Create and publish manifest
    runs-on: ubuntu-latest
    needs: build_and_publish_platform_containers
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-tags: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Create and push Github Container Registry manifest
        env:
          APP_VERSION: ${{ inputs.tag || '' }}
        run: |
          if [ -z "$APP_VERSION" ]; then
            APP_VERSION="$(git name-rev --tags --name-only $(git rev-parse HEAD) | head -n 1 | sed 's/\^0//')"
          fi
          GIT_SHA="$(git rev-parse HEAD)"

          if [[ "$APP_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            docker manifest create \
              ghcr.io/freesign-io/freesign:latest \
              --amend ghcr.io/freesign-io/freesign-amd64:latest \
              --amend ghcr.io/freesign-io/freesign-arm64:latest

            docker manifest push ghcr.io/freesign-io/freesign:latest
          fi

          if [[ "$APP_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            docker manifest create \
              ghcr.io/freesign-io/freesign:rc \
              --amend ghcr.io/freesign-io/freesign-amd64:rc \
              --amend ghcr.io/freesign-io/freesign-arm64:rc

            docker manifest push ghcr.io/freesign-io/freesign:rc
          fi

          docker manifest create \
            ghcr.io/freesign-io/freesign:$GIT_SHA \
            --amend ghcr.io/freesign-io/freesign-amd64:$GIT_SHA \
            --amend ghcr.io/freesign-io/freesign-arm64:$GIT_SHA

          docker manifest create \
            ghcr.io/freesign-io/freesign:$APP_VERSION \
            --amend ghcr.io/freesign-io/freesign-amd64:$APP_VERSION \
            --amend ghcr.io/freesign-io/freesign-arm64:$APP_VERSION

          docker manifest push ghcr.io/freesign-io/freesign:$GIT_SHA
          docker manifest push ghcr.io/freesign-io/freesign:$APP_VERSION
